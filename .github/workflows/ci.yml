name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Fix Tailwind native bindings
        run: |
          npm pack @tailwindcss/oxide-linux-x64-gnu@4.2.4 2>/dev/null || true
          mkdir -p /tmp/oxide-native
          tar xzf tailwindcss-oxide-linux-x64-gnu-*.tgz -C /tmp/oxide-native 2>/dev/null || true
          echo "NAPI_RS_NATIVE_LIBRARY_PATH=/tmp/oxide-native/package" >> $GITHUB_ENV

      - name: Check formatting
        run: npx prettier --check .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Fix Tailwind native bindings
        run: |
          npm pack @tailwindcss/oxide-linux-x64-gnu@4.2.4 2>/dev/null || true
          mkdir -p /tmp/oxide-native
          tar xzf tailwindcss-oxide-linux-x64-gnu-*.tgz -C /tmp/oxide-native 2>/dev/null || true
          echo "NAPI_RS_NATIVE_LIBRARY_PATH=/tmp/oxide-native/package" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Fix Tailwind native bindings
        run: |
          npm pack @tailwindcss/oxide-linux-x64-gnu@4.2.4 2>/dev/null || true
          mkdir -p /tmp/oxide-native
          tar xzf tailwindcss-oxide-linux-x64-gnu-*.tgz -C /tmp/oxide-native 2>/dev/null || true
          echo "NAPI_RS_NATIVE_LIBRARY_PATH=/tmp/oxide-native/package" >> $GITHUB_ENV

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium

      - name: Fix Tailwind native bindings
        run: |
          npm pack @tailwindcss/oxide-linux-x64-gnu@4.2.4 2>/dev/null || true
          mkdir -p /tmp/oxide-native
          tar xzf tailwindcss-oxide-linux-x64-gnu-*.tgz -C /tmp/oxide-native 2>/dev/null || true
          echo "NAPI_RS_NATIVE_LIBRARY_PATH=/tmp/oxide-native/package" >> $GITHUB_ENV

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
