name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: rm -rf node_modules package-lock.json && npm install --legacy-peer-deps --force
      - name: Fix Tailwind native bindings
        run: |
          npm pack @tailwindcss/oxide-linux-x64-gnu@4.2.4 2>/dev/null || true
          mkdir -p /tmp/oxide-native
          tar xzf tailwindcss-oxide-linux-x64-gnu-*.tgz -C /tmp/oxide-native 2>/dev/null || true
          echo "NAPI_RS_NATIVE_LIBRARY_PATH=/tmp/oxide-native/package" >> $GITHUB_ENV

      - name: Lint
        run: npm run lint || true

      - name: Typecheck
        run: npm run typecheck || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: rm -rf node_modules package-lock.json && npm install
      - run: npm run build:cloudflare

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
