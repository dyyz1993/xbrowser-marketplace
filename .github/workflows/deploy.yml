name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare
        run: npm run build:cloudflare

      - name: Build SSG pages
        run: npm run build:ssg
        env:
          SSG_API_URL: https://xbrowser-marketplace.dyyz1993.workers.dev

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  perf-test:
    name: Performance Test
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Run Performance Tests
        run: |
          chmod +x scripts/perf-test.sh
          bash scripts/perf-test.sh "https://xbrowser-marketplace.dyyz1993.workers.dev"

      - name: Upload Performance Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-report-${{ github.sha }}
          path: perf-reports/
          retention-days: 90

      - name: Add Report to Summary
        if: always()
        run: |
          LATEST_REPORT=$(ls -t perf-reports/*.md | head -1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "# 📊 Performance Report" >> $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          fi
